## 山田《やまだ》県|由嘉野《ゆかの》市
　架空の地方都市。東京、仙台までそれぞれ車で二～三時間程度の立地。
　海もあり、山もあり、学校もあり、古くからの歴史もある、フツーの町。

## 異世界からの生活者
　由嘉野《ゆかの》市では、日本国内でも珍しく、異世界からの渡航者である「異邦人」や、異世界との接触・親からの遺伝などで特殊な能力を持つ「異能者（侵食者）」など、奇妙な特徴や特殊能力を持つ人々が、ごくフツーに暮らしている。
　
　この町には「特別渡航生活者《とくべつとこうせいかつしゃ》（特渡生《とくとせい》）支援制度」という制度があり、由嘉野市役所で手続きをすることで、異世界から来た人間でも戸籍相当のものを獲得し、住居を契約したり、労働したり、商売したりできる。
　また、特殊能力がある人向けの支援制度（能力を生かした就職のマッチングや、能力のある生活に慣れるための訓練をする場所・機会の提供、地域への説明会の主催など）も多くあり、この町の人々はネコミミが生えていたり超能力が使えたりする人への寛容さが妙に高いらしい（日本の他の地域における外国人と同じぐらいのノリ）。

### 特渡生制度について
　由嘉野市役所の市民生活相談課には「特別相談係」という特殊な部署があり、この部署には「特別相談員」と呼ばれる、ソーシャルワーカーの資格を持った人たちを抱えている（嘱託職員を含む）。
　彼らの仕事は、異世界から来た人（異邦人）や、特殊能力に目覚めたせいで困っている人の相談に乗り、自律的な生活の支援をすることである。
　
　由嘉野市には異邦人向けの「特別渡航生活者支援制度（通称、特渡生制度《とくとせいせいど》）」があり、特別渡航生活者手帳（通称「金の手帳」）の発行手続きをすることで、この手帳を身分証明証として、由嘉野市に住民票を登録することができるのだ（ただし、住民税や国民年金などは発生します）。
　なかには、金の手帳を取らずに不法滞在している異邦人もいるとか……。
　
　由嘉野市は、公的には異世界からの渡航者のことを「特渡生《とくとせい》」と呼称しているが、生活のなかでは「異世界の人」「異邦人」といった呼び方をされることが多いらしい。
　ほとんどの市民は、二足歩行のケモノやロボット、派手髪ぐらいなら平然と受け入れているとかなんとか。
　
　ちなみに、特殊能力を持つ人を登録する制度はないが、由嘉野高校には「適応支援教室（校内での通称は「異能教室」、教育委員会の文書上は「特殊能力者等支援教室」）」と呼ばれる学童のような制度があり、異能者や異邦人同士の交流や、ゆるい適応訓練の場として機能している。ちなみに学生以外でも利用可能。
　なお、いちおう市役所で申請することで「特別能力保有者支援タグ」と呼ばれるピンクのヘルプマークのようなタグが任意で発行できる（が、かなりダサいので持ちたがる人は少ない）。

## おもな場所
![由嘉野市の地図](../../assets/images/world/yukano_map.jpg)
　由嘉野市は大きく5つの地区に分かれている。
　学校や昔ながらの住宅街がある姫坂地区、中心街である夏枯野地区、再開発が進む高級住宅街と海のある西由嘉野地区、果樹園や畑の並ぶ坂古里地区、標高1km越えの奥山田連峰を望む奥山田高原地区。
　おおむね夏枯野を中心に、南東側に姫坂、北西側に西由嘉野、北側に坂古里地区があり、北東から西まで市内を囲うように奥山田連峰が連なる。
　
### おもな駅
（至山田県）- 西由嘉野《にしゆかの》駅 - 夏枯野《なつがれや》駅 - 姫坂《ひめさか》駅（終点）
　ほか、バスや車で坂古里地区《さかこりちく》、奥山田連峰《おくやまだれんぽう》方面へ向かうことができる。
　山田県方面に抜ける国道509号線は、海沿いを過ぎて「由嘉野トンネル」を越えるとすぐ山田市内に入る。
　
### 姫坂（ヒメサカ）地区
* 公立由嘉野高等学校《こうりつゆかのこうとうがっこう》
　生徒数999人超のマンモス高校。部活動のバリエーションが多すぎることで有名。
　隣の山田市から電車で通う生徒も多い。やや高台にあり、水害の際は避難所にもなる。
* 姫坂《ひめさか》商店街
　高校から一番近い商店街。昭和のアーケードが残る。買い食いの聖地。
* 魔女坂文具店《まじょさかぶんぐてん》
　指定の教科書から文房具、恋のおまじないグッズまでなんでも揃う最強の文具店。店主は魔女。
* |浦ノ山《うらのやま》
　学校の裏にある小さめの山。熊は出ないがおばけが出る、神隠しに遭うともっぱらのウワサ。
* 姫坂《ひめさか》駅
　学校の最寄り駅。商店街のすぐそば。駅舎とトイレが古い。奥山田線の終点。

### 夏枯野（ナツガレヤ）地区
* 夏枯野《なつがれや》駅
　姫坂のひとつ前の駅。由嘉野市の中心街。
* 由嘉野市役所
　夏枯野駅の近くにある由嘉野市の役所。
　裏手の川沿いにある第二庁舎には、異邦人専門部署がたくさんある。
* アインモールゆかの
　由嘉野市内で一番大きなショッピングモール。ゲームセンターやフードコートがある。
* なつがれや横丁
　夏枯野駅の近くにある繁華街。カラオケや飲み屋が並ぶ。
* 錦光山還浄寺《きんこうざん・へんじょうじ》
　由嘉野にあるお寺。浄土真宗。
* 錦川団地
　市営住宅。特渡生の仮住まいにも使われることがある。けっこう古い。

### 西由嘉野（ニシユカノ）地区
* 西由嘉野《にしゆかの》駅
　夏枯野のひとつ前の駅。高級住宅街に出る北口と、海水浴場方面に出る南口がある。
* |錦ヶ丘《にしきがおか》住宅街
　西由嘉野にある高級住宅街。ほかより地盤が一段高い台地になっている。
* 錦ヶ丘スカイフレアマンション
　西由嘉野駅のすぐ傍に立つ、地上40階の高層マンション。
* なつがれや海水浴場
　ひとなつの想いで。夏になると海水浴客で賑わう。
* 旧坂古里トンネル
　封鎖されたトンネル。ここへ向かう道には「この先行き止まり」の看板がたくさんある。
    
### 坂古里（サカコリ）地区
* 坂古里《さかこり》神社
　坂古里山山腹に鎮座する古社。「狐狸祭」などの独自の祭祀が現在も残る。
* 錦川《にしきがわ》ダム
　錦川上流、坂古里神社の治める森の一部を沈める形で出来たダム。
　坂古里神社の宮司たちはダム建築に賛成していたらしい。
* 古里湖《こりこ》
　錦川ダムの人工湖（いわゆるダム湖）。
　水面に狐火が浮かぶなど、怪談が絶えない有名な心霊スポット。
* 由嘉野中央総合病院
　夏枯野《なつがれや》の官庁街近くにある大きな総合病院。
　人外の患者を診る場合も含め、あらゆるケースに対応している。ので、獣医師もいる。
* 境山《さかいやま》墓地
　市民墓地。かなり広い。
* 由嘉野城址公園《ゆかのじょうしこうえん》
　かつて由嘉藩の城があった場所。桜がいっぱいある。
　縄文時代の生活史跡もある。
    
### 奥山田（オクヤマダ）高原地区
* 奥山田高原《おくやまだこうげん》スキー場
　スノボやそりもできます。
* 坂古里温泉《さかこりおんせん》・眠根荘《ねむりねそう》
　塩化カルシウム天然温泉。ぐっすり眠れると評判。

## おもな歴史
* 先史時代より人が住み、「コリ族（古里、または狐狸）」と呼ばれる集団との交易・祭祀の記録が残っている。
多くの場合これは朝鮮との貿易を指すとされているが、一部の人類学者は「コリ族」とは現在で言うところの異邦人を指し、この地が古くから異界との接点だった可能性を指摘している。
* 大和政権時代には蝦夷との戦争の拠点として砦が設けられた。
この時代は地方豪族の奈津氏が長く支配したが、コリ族との戦争で滅んだ。以降は由嘉氏がコリ族との協定を結んでこの地を統治し、平野を「由嘉野」と名づけた。
* 戦国～江戸時代には由嘉藩として、由嘉氏が長く統治を続けた。
しかし明治維新の際、城内にいた藩主一族と家臣が一夜にして消失するという事件が起き（由嘉藩消失事件）、直系の由嘉野藩主の一族は完全に消失。分家筋の瀬織川家のみが残った。
* 第一次世界大戦～太平洋戦争までの間に、国軍が異邦人らの噂を聞きつけ異能力者を動員しようと訪れたが、異邦人含む住民らが一致団結して「”穏便に”追い返した」とされている。
* 12年前の200X年にはトンネル火災に起因する大規模災害が発生し、西由嘉野の旧住宅地の一部まで延焼。数百名が重軽傷を負い、数名が死亡、トンネル内に取り残された222名が行方不明となっている（旧坂古里トンネル神隠し事件）。
* 由嘉野は昔から神隠しが多い場所として知られている。
