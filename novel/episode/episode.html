　201X年9月29日。

　あの日。
　まだ誰も知らなかった、すべての始まりの日。
***
　由嘉野高校2年生は、学年全員が奥山田高原での自然体験学習として、学習施設に宿泊していた。
　スキーで転び回り、坂古里温泉で大暴れし、枕を投げ合っては生活指導の只野にしょっぴかれ、ちょっとした非日常を楽しんで、多くの生徒が眠りについた頃。

　ただ、ふと眠れなかっただけの生徒の多くが、「それ」を見た。
***
　坂古里神社はちょうど例大祭前夜だった。
　明日に向けて屋台村が準備されていた頃だった。

　寝ずの番で電飾や神楽舞の舞台を準備していた宮司も、「それ」を見た。
***
　ところで、一部の生徒は「新月の夜なので、UFOと交信しよう」とこっそり由嘉野高校の屋上に集まっていた。
　こういうことは由嘉野高校では日常茶飯事で、あらゆる防犯センサーや監視カメラは技術部や発明部がなんらかの独自技術で回避してしまうため意味がなく、痕跡だけが清掃に入った用務員に発見されるに至り、たいてい翌日怒られておしまいなのだが、その夜は違った。

　空が白む直前、解散して帰ろうとしていた物好きたち全員が、「それ」を見た。
***
　その日、眠れずに空を見上げていたもの、なつがれや横丁の路上で酔いつぶれていたもの、とにかく夜が明ける直前、最も昏いあの時間、空の見えるところにいた全ての由嘉野市民が、「それ」を見た。
***
「それ」は、オーロラだった。

　まるで真っ黒な夜空を、星のまたたきを千切るように、つうっと一筋の傷が、夜幕を引き裂いた。
　黒い空に伸びた赤い線は、見る間に細かい皹のように空に広がり、ぶわりと花開く。
　水の中にインクを垂らしたかのように、赤、緑、橙、青、あまねく色をぶちまけた、極彩色のオーロラが、由嘉野市の空を覆った。

　それはわずか60秒程度のことだった。
　時刻が4時45分になるころには、「それ」はまるで何事もなかったかのように消失していた。
　しかし、このわずか一瞬、ひどく明るくなった空の下で、いくらか携帯やラジオの電波が乱れたのを観測した者もいた。

　木枯アユムもその一人だった。
　彼は電話をしていた。しかしその相手は誰でもなかった。彼はちょうど、夜明け前に目を覚まして、自然学習の宿泊施設において、自分のあるべき布団を抜け出して、寒空の下、あの月のない空を見て、ただ何気なく、████に電話しようとしていたのだった。

「██？　ごめん、こんな時間に」
『█████？』
「うん、ちょっと、別に理由はないんだけど」
『███、█』
「うん」

『██、█████────』
「え？」

　聞き返したとき、彼の目の前に、「それ」と共に、「あれ」があった。

　201X年9月29日、新月の夜、夜明け前、この世で最も昏い時間。
「それ」は、空を煌々と照らし出す、ペンキをぶちまけたような、色とりどりのオーロラ。
　そして、「あれ」は。
　決して人知の及ぶ限りの言葉で名状することのできない、本物の『極彩』を纏って光り輝いたのは、途方もなく大きな────

　────月だった。
