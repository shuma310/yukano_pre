<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャラクター紹介 | ゆかの高校◎◎部！！</title>
    <meta name="description" content="ゆかの高校◎◎部！！の登場人物の一覧と詳細設定です。">
    <meta property="og:title" content="キャラクター紹介 | ゆかの高校◎◎部！！">
    <meta name="base-path" content="../">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <!-- 共通ヘッダー読み込み用要素 -->
    <div id="common-header"></div>

    <!-- ===== ヘッダー ===== -->
    <header class="site-header site-header--pink">
        <div class="container">
            <h1 class="page-header-title page-header-title--world"
                style="background: var(--color-white); color: var(--color-dark);">
                CHARACTER <span style="font-size: 60%; color: var(--color-pink);">キャラクター</span>
            </h1>
        </div>
    </header>

    <!-- ===== パンくず ===== -->
    <div class="container">
        <nav class="breadcrumb-nav" aria-label="パンくずナビゲーション">
            <a href="../index.html" class="breadcrumb-item">HOME</a>
            <span class="breadcrumb-sep" aria-hidden="true">&gt;</span>
            <span class="breadcrumb-item breadcrumb-item--active" aria-current="page">キャラクター紹介</span>
        </nav>
    </div>

    <!-- ===== メインコンテンツ ===== -->
    <main class="container mt-8 mb-20">

        <!-- キャラクタービューア -->
        <div id="chara-viewer" class="chara-viewer is-faction-yuka-high">

            <div class="chara-controls">
                <div class="chara-tabs">
                    <div class="chara-tab-header">FACTION</div>
                    <div id="chara-faction-menu" style="display: flex; flex: 1; align-items: center; overflow-x: auto;"
                        class="hide-scrollbar">
                        <!-- JSでここに派閥ボタンが生成される -->
                    </div>
                </div>

                <div id="chara-list" class="chara-list">
                    <!-- JSでここにキャラクタムネイルが生成される -->
                </div>
            </div>
            <div class="chara-display">
                <!-- キャラクターのセリフや情報 -->
                <div id="chara-info-layer" class="chara-display__info">
                    <div class="chara-line-box">
                        <p id="chara-main-line" class="chara-line-text"></p>
                    </div>

                    <div class="chara-detail-box">
                        <div style="display: flex; flex-direction: column;">
                            <h2 id="chara-main-name" class="chara-name"></h2>
                            <p id="chara-main-kana" class="chara-name-kana"></p>
                        </div>
                        <div class="mb-4">
                            <span id="chara-main-faction-badge" class="brutal-tag"></span>
                        </div>
                        <p id="chara-main-bio" class="chara-bio"></p>
                        <div class="mt-4" style="text-align: right;">
                            <a id="chara-main-link" href="#" class="brutal-tag brutal-tag--yellow" style="display: inline-block; text-decoration: none; transform: rotate(-1deg);">詳しく見る &rarr;</a>
                        </div>
                    </div>
                </div>

                <!-- キャラクターの立ち絵 -->
                <img id="chara-main-image" src="" alt="" class="chara-display__image jpeg-blend">
            </div>


        </div>

        <!-- 世界観設定への導線 -->
        <div class="text-center mt-20 mb-8">
            <a href="../world/index.html" class="btn btn-back"
                style="box-shadow: 6px 6px 0px 0px var(--color-yellow); padding: 1.25rem 2.5rem; transform: rotate(-1deg); display: inline-flex; flex-direction: column; align-items: center; max-width: 90%;">
                <span style="font-size: 1.5rem; color: var(--color-dark);">WORLD INDEX &rarr;</span>
                <span
                    style="font-size: 0.9rem; margin-top: 0.5rem; font-family: var(--font-sans); font-weight: bold; color: var(--color-gray-600);">世界観の詳細設定・用語を見る</span>
            </a>
        </div>

        <div class="text-center mt-10">
            <a href="../index.html" class="btn btn-back" style="transform: rotate(1deg); display: inline-block;">
                &larr; トップに戻る
            </a>
        </div>

    </main>

    <!-- 共通フッター読み込み用要素 -->
    <div id="common-footer"></div>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/character-data.js"></script>
    <script src="../assets/js/chara.js"></script>

</body>

</html>
