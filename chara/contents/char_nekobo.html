<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キャラクター紹介 | ゆかの高校◎◎部！！</title>
    <meta name="description" content="ゆかの高校◎◎部！！のキャラクター紹介。">
    <meta property="og:title" content="キャラクター紹介 | ゆかの高校◎◎部！！">
    <meta name="base-path" content="../../">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>

<body data-character-id="nekobo">

    <div id="common-header"></div>

    <header class="site-header site-header--blue">
        <div class="container">
            <h1 class="page-header-title page-header-title--world">CHARACTER</h1>
        </div>
    </header>

    <div class="container container--wide">
        <nav class="breadcrumb-nav" aria-label="パンくずナビゲーション">
            <a href="../../index.html" class="breadcrumb-item">HOME</a>
            <span class="breadcrumb-sep" aria-hidden="true">&gt;</span>
            <a href="../index.html" class="breadcrumb-item">キャラクター紹介</a>
            <span class="breadcrumb-sep" aria-hidden="true">&gt;</span>
            <span id="character-breadcrumb-name" class="breadcrumb-item breadcrumb-item--active"
                aria-current="page"></span>
        </nav>
    </div>

    <main class="container container--wide mt-8 mb-20">
        <div class="char-layout">
            <div class="char-image-col">
                <div id="character-image-wrap" class="char-image-wrap">
                    <div id="character-type-badge" class="char-type-badge" aria-label="キャラクタータイプ"></div>
                </div>
            </div>

            <div class="char-info-col">
                <div>
                    <h2 id="character-name" class="char-name-title"></h2>
                    <p id="character-name-kana" class="char-name-ruby"></p>
                    <div id="character-tags" class="tag-list"></div>
                </div>

                <div class="char-info-box">
                    <h3 id="character-info-title" class="char-info-box__title"></h3>
                    <div id="character-info-body" class="char-info-box__body"></div>
                </div>

                <div class="brutal-card brutal-card--article mt-8">
                    <p id="character-profile-body" class="font-bold" style="font-size: 1.0625rem; line-height: 2;"></p>
                </div>
            </div>
        </div>


        <div class="text-center mt-10">
            <a href="../index.html" class="btn btn-back" style="transform: rotate(-1deg); display: inline-block;">
                &larr; 一覧に戻る
            </a>
        </div>
    </main>

    <div id="common-footer"></div>
    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/character-data.js"></script>
    <script src="../../assets/js/character-detail.js"></script>

</body>
